version: "3.9"

services:
  db:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port ${API_PORT}
    env_file:
      - .env
    depends_on:
      - db
    ports:
      - "${API_PORT}:${API_PORT}"

  poller:
    build: .
    command: python -m app.services.polling_service
    env_file:
      - .env
    depends_on:
      - db

volumes:
  postgres_data: