services:
  db:
    image: postgres:16
    restart: always

    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}

    volumes:
      - postgres_data:/var/lib/postgresql/data

    ports:
      - "5432:5432"

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .

    command: uvicorn app.main:app --host 0.0.0.0 --port ${API_PORT}

    environment:
      RUNNING_IN_DOCKER: "true"

    env_file:
      - .env

    depends_on:
      db:
        condition: service_healthy

    ports:
      - "${API_PORT}:${API_PORT}"

    restart: on-failure

  poller:
    build: .

    command: python -m app.services.polling_service

    env_file:
      - .env
  
    environment:
      RUNNING_IN_DOCKER: "true"

    depends_on:
      db:
        condition: service_healthy

    restart: on-failure

volumes:
  postgres_data: