name: CI

on:
  push:
    branches:
      - main
      - master

  pull_request:
    branches:
      - main
      - master

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16

        env:
          POSTGRES_USER: watchagent
          POSTGRES_PASSWORD: watchagentpassword
          POSTGRES_DB: watchagent

        ports:
          - 5432:5432

        options: >-
          --health-cmd="pg_isready -U watchagent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      POSTGRES_USER: watchagent
      POSTGRES_PASSWORD: watchagentpassword
      POSTGRES_DB: watchagent
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set Up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Upgrade Pip
        run: python -m pip install --upgrade pip

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Verify PostgreSQL Connection Variables
        run: |
          echo "HOST=$POSTGRES_HOST"
          echo "PORT=$POSTGRES_PORT"
          echo "DB=$POSTGRES_DB"

      - name: Wait for PostgreSQL
        run: |
          until pg_isready -h localhost -p 5432 -U watchagent; do
            echo "Waiting for PostgreSQL..."
            sleep 2
          done

      - name: Run Tests
        run: pytest -v --disable-warnings --maxfail=1 -W ignore::UserWarning -W ignore::DeprecationWarning